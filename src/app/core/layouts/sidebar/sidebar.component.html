<aside class="sidebar" [class.collapsed]="isCollapsed">
  <!-- Logo/Brand -->
  <div class="sidebar-header">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <h2 class="brand-text" *ngIf="!isCollapsed">Spikerz</h2>
    </div>

    <!-- Collapse Toggle Button (Desktop) -->
    <button
      *ngIf="!isCollapsed"
      class="collapse-toggle"
      (click)="onToggleSidebar()"
      [attr.aria-label]="'Collapse sidebar'"
      type="button"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M11 19l-7-7 7-7m8 14l-7-7 7-7"
        ></path>
      </svg>
    </button>
  </div>

  <!-- Navigation Menu -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li
        *ngFor="let item of navigationItems"
        class="nav-item"
        [routerLinkActive]="'active'"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <a
          [routerLink]="item.route"
          class="nav-link"
          [attr.aria-label]="item.label | translate"
        >
          <span class="nav-icon" [class]="getIconClass(item.icon)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <!-- Dashboard Icon -->
              <path
                *ngIf="item.icon === 'dashboard'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"
              ></path>
              <!-- Security Icon -->
              <path
                *ngIf="item.icon === 'security'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"
              ></path>
              <!-- Bug Icon -->
              <path
                *ngIf="item.icon === 'bug_report'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
              ></path>
              <!-- Warning Icon -->
              <path
                *ngIf="item.icon === 'warning'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"
              ></path>
              <!-- Settings Icon -->
              <path
                *ngIf="item.icon === 'settings'"
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              ></path>
            </svg>
          </span>
          <span class="nav-text" *ngIf="!isCollapsed">{{
            item.label | translate
          }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- User Profile Section -->
  <div class="sidebar-footer">
    <div class="user-profile">
      <div class="user-avatar">{{ userProfile.avatar }}</div>
      <div class="user-info" *ngIf="!isCollapsed">
        <div class="user-name">{{ userProfile.name }}</div>
        <div class="user-email">{{ userProfile.email }}</div>
      </div>
    </div>

    <button class="logout-btn" [attr.aria-label]="'Logout'" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
        ></path>
      </svg>
      <span *ngIf="!isCollapsed">{{ "navigation.logout" | translate }}</span>
    </button>
  </div>
</aside>
