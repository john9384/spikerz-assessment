<aside class="sidebar">
  <span> </span>
  <div class="navigation-section">
    <ul class="navigation-section__list">
      @for (item of navigationItems; track item) {
      <li class="navigation-section__item">
        <img [src]="item.icon" alt="icon" />
        <span>{{ item.label | translate }}</span>
      </li>
      }
    </ul>
    <ul class="navigation-section__list">
      @for (item of secondaryNavigationItems; track item) {
      <li class="navigation-section__item">
        <img [src]="item.icon" alt="icon" />
        <span>{{ item.label | translate }}</span>
      </li>
      }
    </ul>
  </div>

  <div class="user-section">
    <div class="user-info">
      <span class="user-avatar"
        ><img [src]="userProfile.avatar" alt="avatar"
      /></span>
      <div class="user-info-details">
        <span>{{ userProfile.name | translate }}</span>
        <span>{{ userProfile.email | translate }}</span>
      </div>
    </div>
    <span><img src="" alt="log" /></span>
  </div>
</aside>
